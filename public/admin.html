<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Still Waiting Band — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --dark: #1a1210;
      --dark2: #2a1f1a;
      --cream: #e8d5b7;
      --teal: #3ba5b5;
      --gold: #c4956a;
      --red: #c0392b;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--cream);
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
    }
    h1 { color: var(--teal); margin-bottom: 8px; font-size: 24px; }
    h2 { color: var(--gold); margin: 30px 0 15px; font-size: 18px; }
    p.subtitle { color: rgba(232,213,183,0.5); margin-bottom: 30px; font-size: 14px; }

    /* LOGIN */
    #login-section { margin-top: 40px; }
    #app-section { display: none; }

    /* FORM */
    label {
      display: block; margin-top: 14px; margin-bottom: 4px;
      font-size: 14px; color: var(--gold);
    }
    input, textarea {
      width: 100%; padding: 10px 12px;
      background: var(--dark2);
      border: 1px solid rgba(59,165,181,0.3);
      color: var(--cream);
      font-size: 15px;
      font-family: 'Segoe UI', sans-serif;
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: var(--teal);
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn {
      display: inline-block; padding: 10px 24px;
      font-size: 15px; font-weight: 600;
      border: none; cursor: pointer;
      margin-top: 16px; transition: all 0.3s;
    }
    .btn-teal { background: var(--teal); color: var(--dark); }
    .btn-teal:hover { background: var(--gold); }
    .btn-red { background: var(--red); color: white; padding: 6px 14px; font-size: 13px; margin-top: 0; }
    .btn-red:hover { background: #e74c3c; }

    /* SHOWS LIST */
    .show-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--dark2);
      border: 1px solid rgba(59,165,181,0.15);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .show-item:hover { border-color: var(--teal); }
    .show-details { flex: 1; }
    .show-details strong { color: var(--cream); font-size: 15px; }
    .show-details span { display: block; font-size: 13px; color: var(--gold); margin-top: 2px; white-space: pre-line; }
    .show-date-badge {
      font-size: 13px; color: var(--teal);
      min-width: 90px; text-align: center; margin-right: 14px;
    }

    .msg {
      padding: 10px 14px; margin-top: 14px;
      font-size: 14px; display: none;
    }
    .msg-success { background: rgba(59,165,181,0.15); color: var(--teal); }
    .msg-error { background: rgba(192,57,43,0.15); color: var(--red); }

    .empty { color: rgba(232,213,183,0.4); font-size: 14px; font-style: italic; }
    hr { border: none; border-top: 1px solid rgba(59,165,181,0.15); margin: 30px 0; }
  </style>
</head>
<body>

  <h1>Still Waiting Band — Admin</h1>
  <p class="subtitle">Manage upcoming shows</p>
  <a href="/#shows" style="color: var(--teal); font-size: 14px; text-decoration: none;">← Back to Shows Page</a>

  <!-- LOGIN -->
  <div id="login-section">
    <label for="password">Enter admin password</label>
    <input type="password" id="password" placeholder="Password">
    <button class="btn btn-teal" onclick="login()">Log In</button>
    <div id="login-msg" class="msg msg-error"></div>
  </div>

  <!-- APP -->
  <div id="app-section">

    <h2>Add a Show</h2>
    <label for="show-date">Date</label>
    <input type="date" id="show-date">

    <label for="show-venue">Venue</label>
    <input type="text" id="show-venue" placeholder="e.g. The Blue Note">

    <label for="show-city">City</label>
    <input type="text" id="show-city" placeholder="e.g. St. Louis, MO">

    <label for="show-details">Details (optional)</label>
    <textarea id="show-details" placeholder="e.g. Doors open at 7:00 p.m.&#10;Show starts at 8:00 p.m.&#10;$10 cover"></textarea>

    <button class="btn btn-teal" onclick="addShow()">Add Show</button>
    <div id="add-msg" class="msg"></div>

    <hr>

    <h2>Current Shows</h2>
    <div id="shows-list"><p class="empty">Loading...</p></div>
  </div>

  <script>
    const API = "/api/shows";
    let token = "";

    function login() {
      token = document.getElementById("password").value;
      document.getElementById("login-section").style.display = "none";
      document.getElementById("app-section").style.display = "block";
      loadShows();
    }

    async function loadShows() {
      try {
        const res = await fetch(API);
        const data = await res.json();
        const list = document.getElementById("shows-list");

        if (!data.shows || data.shows.length === 0) {
          list.innerHTML = '<p class="empty">No shows added yet.</p>';
          return;
        }

        list.innerHTML = data.shows.map(s => `
          <div class="show-item">
            <div class="show-date-badge">${formatDate(s.date)}</div>
            <div class="show-details">
              <strong>${escHtml(s.venue)}</strong>
              <span>${escHtml(s.city)}${s.details ? '\n' + escHtml(s.details) : ''}</span>
            </div>
            <button class="btn btn-red" onclick="deleteShow(${s.id})">Delete</button>
          </div>
        `).join("");
      } catch (err) {
        document.getElementById("shows-list").innerHTML = '<p class="msg-error">Failed to load shows.</p>';
      }
    }

    async function addShow() {
      const msg = document.getElementById("add-msg");
      const date = document.getElementById("show-date").value;
      const venue = document.getElementById("show-venue").value;
      const city = document.getElementById("show-city").value;
      const details = document.getElementById("show-details").value;

      if (!date || !venue || !city) {
        showMsg(msg, "Date, venue, and city are required.", "error");
        return;
      }

      try {
        const res = await fetch(API, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ date, venue, city, details })
        });
        const data = await res.json();

        if (!res.ok) {
          showMsg(msg, data.error || "Failed to add show.", "error");
          return;
        }

        showMsg(msg, "Show added!", "success");
        document.getElementById("show-date").value = "";
        document.getElementById("show-venue").value = "";
        document.getElementById("show-city").value = "";
        document.getElementById("show-details").value = "";
        loadShows();
      } catch (err) {
        showMsg(msg, "Failed to add show.", "error");
      }
    }

    async function deleteShow(id) {
      if (!confirm("Are you sure you want to delete this show?")) return;

      try {
        const res = await fetch(API, {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ id })
        });

        if (!res.ok) {
          const data = await res.json();
          alert(data.error || "Failed to delete show.");
          return;
        }

        loadShows();
      } catch (err) {
        alert("Failed to delete show.");
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return "TBA";
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    function escHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    function showMsg(el, text, type) {
      el.textContent = text;
      el.className = `msg msg-${type}`;
      el.style.display = "block";
      setTimeout(() => { el.style.display = "none"; }, 3000);
    }
  </script>
</body>
</html>
